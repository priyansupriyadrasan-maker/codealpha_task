<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Music Player</title>
    <style>
        /* CSS STYLING */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #ffffff;
            padding: 20px;
        }

        .player-container {
            width: 360px;
            background-color: rgba(26, 26, 36, 0.95);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Song Info */
        .song-details {
            text-align: center;
            margin-bottom: 24px;
        }

        .track-art {
            width: 180px;
            height: 180px;
            background-color: #3d3d4d;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            background-image: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=300');
            background-size: cover;
            background-position: center;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.4);
            transition: transform 0.5s linear;
        }

        /* Spin rotation animation when playing */
        .playing .track-art {
            animation: rotateArt 12s infinite linear;
        }

        @keyframes rotateArt {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .track-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 0.95rem;
            color: #b3b3b3;
        }

        /* Progress Slider Layout */
        .progress-area {
            margin-bottom: 20px;
        }

        .sliders {
            -webkit-appearance: none;
            width: 200%;
            height: 6px;
            background: #3d3d4d;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        .sliders::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1db954; /* Spotify Green Accent */
            cursor: pointer;
            transition: transform 0.1s;
        }

        .sliders::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .time-box {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #b3b3b3;
            margin-top: 6px;
        }

        /* Control Knobs */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .btn:hover {
            color: #1db954;
        }

        .btn:active {
            transform: scale(0.9);
        }

        .playpause-btn {
            font-size: 2.5rem;
            color: #1db954;
        }

        .playpause-btn:hover {
            color: #1ed760;
            transform: scale(1.05);
        }

        /* Volume Widget Layout */
        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: #b3b3b3;
        }

        .volume-container .sliders {
            width: 40%;
        }

        /* Playlist Interface Wrap */
        .playlist-container {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            max-height: 140px;
            overflow-y: auto;
        }

        .playlist-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #1db954;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }

        .playlist-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .playlist-item.active-track {
            background-color: rgba(29, 185, 84, 0.2);
            color: #1db954;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="player-container" id="player">
        <div class="song-details">
            <div class="track-art" id="track-art"></div>
            <div class="track-name" id="track-name">Song Loading...</div>
            <div class="track-artist" id="track-artist">Artist Loading...</div>
        </div>

        <div class="progress-area">
            <input type="range" id="progress-slider" class="sliders" min="0" max="100" value="0" onchange="seekTo()">
            <div class="time-box">
                <span id="current-time">0:00</span>
                <span id="total-duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="previousTrack()">⏮</button>
            <button class="btn playpause-btn" id="playpause-btn" onclick="togglePlayPause()">▶</button>
            <button class="btn" onclick="nextTrack()">⏭</button>
        </div>

        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volume-slider" class="sliders" min="0" max="100" value="80" oninput="setVolume()">
            <span>🔊</span>
        </div>

        <div class="playlist-container">
            <div class="playlist-title">Queue</div>
            <div id="playlist-list"></div>
        </div>
    </div>

    <script>
        // JAVASCRIPT CONTROL LOGIC
        
        // Define your frontend-only song database list (Using royalty-free sample music stream assets)
        const trackList = [
            {
                name: "Summer Chill",
                artist: "Lofi Track Profile",
                path: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
            },
            {
                name: "Retro Synthwave",
                artist: "Neon Beats",
                path: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
            },
            {
                name: "Cyber Acoustics",
                artist: "Digital Horizon Studio",
                path: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
            }
        ];

        let trackIndex = 0;
        let isPlaying = false;
        let updateTimer;

        // Instantiate native HTML5 audio construct element
        const audioNode = document.createElement('audio');

        // Target UI Layout Nodes
        const player = document.getElementById('player');
        const trackArt = document.getElementById('track-art');
        const trackName = document.getElementById('track-name');
        const trackArtist = document.getElementById('track-artist');
        const playPauseBtn = document.getElementById('playpause-btn');
        const progressSlider = document.getElementById('progress-slider');
        const currentTimeDisplay = document.getElementById('current-time');
        const totalDurationDisplay = document.getElementById('total-duration');
        const volumeSlider = document.getElementById('volume-slider');
        const playlistList = document.getElementById('playlist-list');

        function loadTrack(index) {
            clearInterval(updateTimer);
            resetSliderValues();

            audioNode.src = trackList[index].path;
            audioNode.load();

            trackName.innerText = trackList[index].name;
            trackArtist.innerText = trackList[index].artist;

            // Continually poll timeframe details matching media play state
            updateTimer = setInterval(updateProgress, 1000);

            // Automatically advance queue layout when track reaches end (Autoplay Feature)
            audioNode.addEventListener('ended', nextTrack);

            renderPlaylist();
        }

        function resetSliderValues() {
            progressSlider.value = 0;
            currentTimeDisplay.innerText = "0:00";
            totalDurationDisplay.innerText = "0:00";
        }

        function togglePlayPause() {
            if (!isPlaying) playTrack();
            else pauseTrack();
        }

        function playTrack() {
            audioNode.play();
            isPlaying = true;
            player.classList.add('playing');
            playPauseBtn.innerText = "⏸"; // Change visual character icon to pause
        }

        function pauseTrack() {
            audioNode.pause();
            isPlaying = false;
            player.classList.remove('playing');
            playPauseBtn.innerText = "▶"; // Change visual character icon to play
        }

        function nextTrack() {
            if (trackIndex < trackList.length - 1) {
                trackIndex += 1;
            } else {
                trackIndex = 0; // Loop back to start
            }
            loadTrack(trackIndex);
            playTrack();
        }

        function previousTrack() {
            if (trackIndex > 0) {
                trackIndex -= 1;
            } else {
                trackIndex = trackList.length - 1; // Go to last item
            }
            loadTrack(trackIndex);
            playTrack();
        }

        function seekTo() {
            // Reposition absolute time markers when sliding manually
            let seekPercentage = audioNode.duration * (progressSlider.value / 100);
            if(!isNaN(seekPercentage)) {
                audioNode.currentTime = seekPercentage;
            }
        }

        function setVolume() {
            audioNode.volume = volumeSlider.value / 100;
        }

        function updateProgress() {
            let timelinePercent = 0;

            if (!isNaN(audioNode.duration)) {
                timelinePercent = audioNode.currentTime * (100 / audioNode.duration);
                progressSlider.value = timelinePercent;

                // Format calculations to minutes/seconds readouts
                let currentMins = Math.floor(audioNode.currentTime / 60);
                let currentSecs = Math.floor(audioNode.currentTime - currentMins * 60);
                let durationMins = Math.floor(audioNode.duration / 60);
                let durationSecs = Math.floor(audioNode.duration - durationMins * 60);

                if (currentSecs < 10) { currentSecs = "0" + currentSecs; }
                if (durationSecs < 10) { durationSecs = "0" + durationSecs; }

                currentTimeDisplay.innerText = currentMins + ":" + currentSecs;
                totalDurationDisplay.innerText = durationMins + ":" + durationSecs;
            }
        }

        // Render queue tracking element dynamically
        function renderPlaylist() {
            playlistList.innerHTML = "";
            trackList.forEach((track, i) => {
                const item = document.createElement('div');
                item.classList.add('playlist-item');
                if (i === trackIndex) item.classList.add('active-track');
                
                item.innerHTML = `<span>${track.name}</span><span>${track.artist}</span>`;
                item.setAttribute('onclick', `selectTrack(${i})`);
                playlistList.appendChild(item);
            });
        }

        function selectTrack(i) {
            trackIndex = i;
            loadTrack(trackIndex);
            playTrack();
        }

        // Initialize program deck structure setup on window startup loading
        loadTrack(trackIndex);
        audioNode.volume = volumeSlider.value / 100;
    </script>
</body>
</html>
