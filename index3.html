<!DOCTYPE html>
<html>
<head>
    <title>Music Player</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#222;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .player{
            width:350px;
            background:#333;
            padding:20px;
            border-radius:10px;
            text-align:center;
        }

        button{
            padding:10px 15px;
            margin:10px;
            font-size:18px;
            cursor:pointer;
        }

        input[type="range"]{
            width:100%;
        }

        ul{
            list-style:none;
            padding:0;
        }

        li{
            padding:8px;
            cursor:pointer;
            border-bottom:1px solid #555;
        }

        li:hover{
            background:#555;
        }
    </style>
</head>
<body>

<div class="player">
    <h2>Music Player</h2>

    <h3 id="title">Song 1</h3>
    <p id="artist">Artist 1</p>

    <audio id="audio">
        <source src="song1.mp3" type="audio/mpeg">
    </audio>

    <input type="range" id="progress" value="0">

    <p>
        <span id="currentTime">0:00</span> /
        <span id="duration">0:00</span>
    </p>

    <button onclick="prevSong()">⏮</button>
    <button onclick="playPause()">▶/⏸</button>
    <button onclick="nextSong()">⏭</button>

    <br><br>

    Volume:
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">

    <h3>Playlist</h3>
    <ul id="playlist"></ul>
</div>

<script>
const songs = [
    {title:"Song 1", artist:"Artist 1", src:"song1.mp3"},
    {title:"Song 2", artist:"Artist 2", src:"song2.mp3"},
    {title:"Song 3", artist:"Artist 3", src:"song3.mp3"}
];

let currentSong = 0;

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");
const currentTime = document.getElementById("currentTime");
const duration = document.getElementById("duration");
const playlist = document.getElementById("playlist");

function loadSong(index){
    audio.src = songs[index].src;
    title.innerHTML = songs[index].title;
    artist.innerHTML = songs[index].artist;
}

function playPause(){
    if(audio.paused)
        audio.play();
    else
        audio.pause();
}

function nextSong(){
    currentSong = (currentSong + 1) % songs.length;
    loadSong(currentSong);
    audio.play();
}

function prevSong(){
    currentSong = (currentSong - 1 + songs.length) % songs.length;
    loadSong(currentSong);
    audio.play();
}

audio.addEventListener("timeupdate", function(){
    progress.max = audio.duration;
    progress.value = audio.currentTime;

    currentTime.innerHTML = formatTime(audio.currentTime);
    duration.innerHTML = formatTime(audio.duration);
});

progress.addEventListener("input", function(){
    audio.currentTime = progress.value;
});

volume.addEventListener("input", function(){
    audio.volume = volume.value;
});

function formatTime(time){
    if(isNaN(time)) return "0:00";
    let min = Math.floor(time/60);
    let sec = Math.floor(time%60);
    if(sec < 10) sec = "0" + sec;
    return min + ":" + sec;
}

audio.addEventListener("ended", nextSong);

songs.forEach((song,index)=>{
    let li = document.createElement("li");
    li.innerHTML = song.title + " - " + song.artist;

    li.onclick = function(){
        currentSong = index;
        loadSong(currentSong);
        audio.play();
    };

    playlist.appendChild(li);
});

loadSong(0);
</script>

</body>
</html>
