<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator Project</title>
    <style>
        /* CSS STYLING */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: blueviolet;
        }

        .calculator {
            width: 330px;
            background-color: #1a1a1e;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .display {
            background-color: #0b0b0d;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: right;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            word-wrap: break-word;
            word-break: break-all;
        }

        .previous-operand {
            color: rgba(255, 255, 255, 0.4);
            font-size: 1rem;
            letter-spacing: 1px;
            min-height: 1.2rem;
        }

        .current-operand {
            color: #ffffff;
            font-size: 2.25rem;
            font-weight: 500;
            margin-top: 5px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            background-color: #2a2a32;
            color: #ffffff;
            font-size: 1.4rem;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #383844;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .operator {
            background-color: #ff9f0a;
            color: #ffffff;
            font-weight: bold;
        }

        .operator:hover {
            background-color: #e68a00;
        }

        .clear, .delete {
            background-color: whitesmoke;
            color: #ff453a;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .clear:hover, .delete:hover {
            background-color: #4e4e63;
        }

        .equal {
            background-color: #30d158;
            color: #ffffff;
            font-weight: bold;
        }

        .equal:hover {
            background-color: #24b34b;
        }

        .two-columns {
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display">
            <div id="previous-operand" class="previous-operand"></div>
            <div id="current-operand" class="current-operand">0</div>
        </div>
        
        <div class="buttons">
            <button class="btn clear two-columns" onclick="clearScreen()">AC</button>
            <button class="btn delete" onclick="deleteNumber()">DEL</button>
            <button class="btn operator" onclick="appendOperator('/')">÷</button>
            
            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn operator" onclick="appendOperator('*')">×</button>
            
            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn operator" onclick="appendOperator('-')">-</button>
            
            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn operator" onclick="appendOperator('+')">+</button>
            
            <button class="btn two-columns" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendNumber('.')">.</button>
            <button class="btn equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        const currentDisplay = document.getElementById('current-operand');
        const previousDisplay = document.getElementById('previous-operand');

        let currentInput = '0';
        let previousInput = '';
        let operation = undefined;

        function appendNumber(number) {
            if (number === '.' && currentInput.includes('.')) return;
            if (currentInput === '0' && number !== '.') {
                currentInput = number;
            } else {
                currentInput = currentInput.toString() + number.toString();
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (currentInput === '') {
                if (previousInput !== '') {
                    operation = op;
                    updateDisplay();
                }
                return;
            }
            if (previousInput !== '') {
                calculate();
            }
            operation = op;
            previousInput = currentInput;
            currentInput = '';
            updateDisplay();
        }

        function calculate() {
            let computation;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case '+':
                    computation = prev + current;
                    break;
                case '-':
                    computation = prev - current;
                    break;
                case '*':
                    computation = prev * current;
                    break;
                case '/':
                    computation = current === 0 ? "Error" : prev / current;
                    break;
                default:
                    return;
                }

            currentInput = computation.toString();
            operation = undefined;
            previousInput = '';
            updateDisplay();
        }

        function clearScreen() {
            currentInput = '0';
            previousInput = '';
            operation = undefined;
            updateDisplay();
        }

        function deleteNumber() {
            if (currentInput === '0' || currentInput === '') return;
            currentInput = currentInput.toString().slice(0, -1);
            if (currentInput === '') currentInput = '0';
            updateDisplay();
        }

        function updateDisplay() {
            currentDisplay.innerText = currentInput;
            if (operation != null) {
                previousDisplay.innerText = `${previousInput} ${getOperatorSymbol(operation)}`;
            } else {
                previousDisplay.innerText = '';
            }
        }

        function getOperatorSymbol(op) {
            if (op === '*') return '×';
            if (op === '/') return '÷';
            return op;
        }

        // Keyboard Input Mapping
        window.addEventListener('keydown', e => {
            if ((e.key >= 0 && e.key <= 9) || e.key === '.') appendNumber(e.key);
            if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') appendOperator(e.key);
            if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            }
            if (e.key === 'Backspace') deleteNumber();
            if (e.key === 'Escape') clearScreen();
        });
    </script>
</body>
</html>
